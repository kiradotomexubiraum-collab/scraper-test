<!DOCTYPE html>
<html>
<head>
<title>Scraped Data</title>
</head>

<body>

<h1>Latest Titles</h1>
<ul id="list"></ul>

<script>
fetch("data.json")
.then(res => res.json())
.then(data => {

    const list = document.getElementById("list");

    data.titles.forEach(title => {
        const li = document.createElement("li");
        li.textContent = title;
        list.appendChild(li);
    });

});
</script>

</body>
</html>
