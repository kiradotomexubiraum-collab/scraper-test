<!DOCTYPE html>
<html>

<head>
<title>Preço dos mercado</title>
<link rel="icon" href="data:,">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>
<div class="meinho">
<h2>Preço dos mercado</h2>
</div>
  
<div class="search-container">

<input id="search" placeholder="Procurar produto" oninput="searchProduct()">

<div class="dropdown">

    <div class="dropdown-selected" onclick="toggleDropdown()">
        Todos os mercados
    </div>

    <div class="dropdown-options" id="dropdownOptions">
        <div onclick="selectStore('all')">Todos os mercados</div>
        <div onclick="selectStore('Irani')">Irani</div>
        <div onclick="selectStore('Muffatao')">Muffatao</div>
        <div onclick="selectStore('Festval')">Festval</div>
    </div>

</div>

</div>


<table>
<thead>
<tr>
<th>Produto</th>
<th>Preço</th>
<th>Mercado</th>
</tr>
</thead>

<tbody id="results"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
